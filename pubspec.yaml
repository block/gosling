name: gosling
description: A goose mobile app
publish_to: "none"
version: 0.0.1+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
    
  flutter_hooks: ^0.20.3  
  hooks_riverpod: ^2.4.9
  intl: ^0.19.0
  flutter_svg: ^2.0.17
  rust_lib_gosling:
    path: rust_builder
  flutter_rust_bridge: 2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont.ttf
        - asset: assets/fonts/Inter-Italic-VariableFont.ttf
          style: italic
  assets:
    - assets/images/
